<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в Админ-панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 h-screen flex items-center justify-center text-gray-200">
    <div class="bg-gray-900 p-8 rounded-2xl shadow-2xl w-full max-w-sm border border-red-900/30">
        <div class="text-center mb-6">
            <span class="text-4xl">🔒</span>
            <h2 class="text-2xl font-bold mt-2 text-red-500">Доступ ограничен</h2>
            <p class="text-xs text-gray-500 mt-1">Введите код доступа для входа в панель управления</p>
        </div>

        {% if error %}
        <div class="bg-red-900/20 border border-red-500/50 text-red-200 px-4 py-2 rounded-lg text-sm mb-4 text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="/admin/login" method="POST" class="space-y-4">
            <div>
                <input type="password" name="password" placeholder="Код-пароль" required autofocus
                       class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-center font-mono text-xl tracking-widest focus:outline-none focus:ring-2 focus:ring-red-500 text-white">
            </div>
            <button type="submit" 
                    class="w-full bg-red-600 hover:bg-red-500 text-white py-3 rounded-lg font-bold transition duration-200 shadow-lg shadow-red-900/30">
                Подтвердить
            </button>
        </form>
    </div>
</body>
</html>
