<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Документация API — Осенний Бал 2026</title>
    <!-- Подключаем стили Swagger UI -->
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
        html { box-sizing: border-box; overflow:-y: scroll; }
        *, *:before, *:after { box-sizing: inherit; }
        body { margin: 0; background: #fafafa; }
        /* Небольшая кастомизация шапки */
        .swagger-ui .topbar { background-color: #451a03; } /* Темно-осенний цвет */
    </style>
</head>
<body>
    
    <!-- Контейнер, куда Swagger отрендерит документацию -->
    <div id="swagger-ui"></div>

    <!-- Подключаем скрипты Swagger UI -->
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    
    <script>
        window.onload = () => {
            window.ui = SwaggerUIBundle({
                // Указываем URL, откуда Swagger скачает нашу спецификацию в формате JSON
                url: '/api/users/swagger.json',
                dom_id: '#swagger-ui',
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                layout: "BaseLayout",
                deepLinking: true
            });
        };
    </script>
</body>
</html>
