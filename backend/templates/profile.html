<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки профиля</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-950 min-h-screen py-12 flex items-center justify-center text-amber-100">
    <div class="bg-amber-900/40 p-8 rounded-xl shadow-2xl w-full max-w-md border border-amber-800/60 my-auto">
        <h2 class="text-3xl font-serif font-bold mb-6 text-center text-orange-400">Настройки профиля</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="
                        {% if category == 'success' %} bg-green-900/40 border-green-500/50 text-green-200
                        {% elif category == 'error' %} bg-red-900/40 border-red-500/50 text-red-200
                        {% else %} bg-blue-900/40 border-blue-500/50 text-blue-200 {% endif %}
                        border px-4 py-3 rounded relative mb-4 text-center" role="alert">
                        <span class="block sm:inline">{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- ВАЖНО: enctype="multipart/form-data" необходим для отправки файлов -->
        <form action="/profile" method="POST" enctype="multipart/form-data" class="space-y-4">
            
            <!-- Отображение текущей аватарки -->
            <div class="flex flex-col items-center gap-3 pb-4 border-b border-amber-800/60">
                <img src="{% if user.avatar %}{{ url_for('static', filename='uploads/' + user.avatar) }}{% else %}https://ui-avatars.com/api/?name={{ user.fio }}&background=F97316&color=fff&size=128{% endif %}" 
                     alt="Ваш Аватар" class="w-24 h-24 rounded-full object-cover border-2 border-orange-500 shadow-lg">
                <div class="text-center">
                    <p class="text-xs text-amber-400">Ваше фото профиля</p>
                </div>
            </div>

            <!-- Поля, которые нельзя изменить -->
            <div>
                <label class="block text-xs font-medium mb-1 text-amber-300">ФИО (Нельзя изменить)</label>
                <input type="text" value="{{ user.fio }}" readonly
                       class="w-full px-4 py-2 bg-amber-950/50 border border-amber-800 rounded-lg text-gray-400 cursor-not-allowed text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium mb-1 text-amber-300">Класс/Группа (Нельзя изменить)</label>
                <input type="text" value="{{ user.class_group }}" readonly
                       class="w-full px-4 py-2 bg-amber-950/50 border border-amber-800 rounded-lg text-gray-400 cursor-not-allowed text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium mb-1 text-amber-300">Email (Нельзя изменить)</label>
                <input type="email" value="{{ user.email }}" readonly
                       class="w-full px-4 py-2 bg-amber-950/50 border border-amber-800 rounded-lg text-gray-400 cursor-not-allowed text-sm">
            </div>

            <!-- Редактируемые поля -->
            <div class="pt-4 border-t border-amber-800/60 space-y-4">
                <p class="text-sm font-medium text-orange-400">Изменить информацию:</p>
                
                <!-- Поле выбора аватарки -->
                <div>
                    <label class="block text-xs font-medium mb-1 text-amber-300">Изменить аватарку (до 2МБ)</label>
                    <input type="file" name="avatar" accept="image/*"
                           class="w-full text-xs text-amber-300 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-orange-600 file:text-white hover:file:bg-orange-500 file:cursor-pointer cursor-pointer">
                </div>

                <div>
                    <label class="block text-xs font-medium mb-1 text-amber-300">Номер телефона</label>
                    <input type="tel" name="phone" value="{{ user.phone }}" autocomplete="tel"
                           class="w-full px-4 py-2 bg-amber-950/80 border border-amber-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-white text-sm">
                </div>
                <div>
                    <label class="block text-xs font-medium mb-1 text-amber-300">Дополнительные пожелания/вопросы</label>
                    <textarea name="wishes" rows="3"
                              class="w-full px-4 py-2 bg-amber-950/80 border border-amber-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-white text-sm resize-y">{{ user.wishes }}</textarea>
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-orange-600 text-white py-2 rounded-lg font-semibold hover:bg-orange-500 transition duration-200 shadow-lg shadow-orange-950 mt-6">
                Сохранить изменения
            </button>
        </form>
        <p class="mt-4 text-xs text-center text-amber-500">
            <a href="/" class="text-orange-400 hover:underline">← На главную</a>
        </p>
    </div>
</body>
</html>
