<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки профиля</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-950 h-screen flex items-center justify-center text-amber-100">
    <div class="bg-amber-900/40 p-8 rounded-xl shadow-2xl w-full max-w-md border border-amber-800/60">
        <h2 class="text-3xl font-serif font-bold mb-6 text-center text-orange-400">Настройки профиля</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="
                        {% if category == 'success' %} bg-green-900/40 border-green-500/50 text-green-200
                        {% elif category == 'error' %} bg-red-900/40 border-red-500/50 text-red-200
                        {% else %} bg-blue-900/40 border-blue-500/50 text-blue-200 {% endif %}
                        border px-4 py-3 rounded relative mb-4" role="alert">
                        <span class="block sm:inline">{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/profile" method="POST" class="space-y-4">
            <!-- Обязательные поля (не редактируются здесь) -->
            <div>
                <label class="block text-sm font-medium mb-1 text-amber-300">ФИО (Нельзя изменить)</label>
                <input type="text" value="{{ user.fio }}" readonly
                       class="w-full px-4 py-2 bg-amber-950/50 border border-amber-800 rounded-lg text-gray-400 cursor-not-allowed">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-amber-300">Класс/Группа (Нельзя изменить)</label>
                <input type="text" value="{{ user.class_group }}" readonly
                       class="w-full px-4 py-2 bg-amber-950/50 border border-amber-800 rounded-lg text-gray-400 cursor-not-allowed">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-amber-300">Email (Нельзя изменить)</label>
                <input type="email" value="{{ user.email }}" readonly
                       class="w-full px-4 py-2 bg-amber-950/50 border border-amber-800 rounded-lg text-gray-400 cursor-not-allowed">
            </div>

            <!-- Необязательные поля (редактируются) -->
            <div class="pt-4 border-t border-amber-800/60">
                <p class="text-sm font-medium mb-2 text-amber-400">Измените необязательные данные:</p>
                <div>
                    <label class="block text-sm font-medium mb-1 text-amber-300">Номер телефона</label>
                    <input type="tel" name="phone" value="{{ user.phone }}" autocomplete="tel"
                           class="w-full px-4 py-2 bg-amber-950/80 border border-amber-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-white">
                </div>
                <div class="mt-4">
                    <label class="block text-sm font-medium mb-1 text-amber-300">Дополнительные пожелания/вопросы</label>
                    <textarea name="wishes" rows="3"
                              class="w-full px-4 py-2 bg-amber-950/80 border border-amber-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-white resize-y">{{ user.wishes }}</textarea>
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-orange-600 text-white py-2 rounded-lg font-semibold hover:bg-orange-500 transition duration-200 shadow-lg shadow-orange-950 mt-6">
                Сохранить изменения
            </button>
        </form>
        <p class="mt-4 text-xs text-center text-amber-500">
            <a href="/" class="text-orange-400 hover:underline">← На главную</a>
        </p>
    </div>
</body>
</html>
