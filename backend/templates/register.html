<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация на Бал</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-950 h-screen flex items-center justify-center text-amber-100">
    <div class="bg-amber-900/40 p-8 rounded-xl shadow-2xl w-full max-w-md border border-amber-800/60">
        <h2 class="text-3xl font-serif font-bold mb-6 text-center text-orange-400">Регистрация на Бал</h2>
        
        {% if error %}
        <div class="bg-red-900/40 border border-red-500/50 text-red-200 px-4 py-2 rounded-lg text-sm mb-4 text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="/register" method="POST" class="space-y-4">
            <!-- Обязательные поля -->
            <div>
                <label class="block text-sm font-medium mb-1 text-amber-300">ФИО (Обязательно)</label>
                <input type="text" name="fio" required autocomplete="name"
                       class="w-full px-4 py-2 bg-amber-950/80 border border-amber-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-white">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-amber-300">Класс/Группа (Обязательно)</label>
                <input type="text" name="class_group" required autocomplete="organization-title"
                       class="w-full px-4 py-2 bg-amber-950/80 border border-amber-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-white">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-amber-300">Email (Обязательно, для входа)</label>
                <input type="email" name="email" required autocomplete="email"
                       class="w-full px-4 py-2 bg-amber-950/80 border border-amber-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-white">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-amber-300">Пароль (Обязательно)</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-2 bg-amber-950/80 border border-amber-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-white">
            </div>

            <!-- Необязательные поля -->
            <div class="pt-4 border-t border-amber-800/60">
                <p class="text-sm font-medium mb-2 text-amber-400">Необязательные поля (можно заполнить позже в профиле):</p>
                <div>
                    <label class="block text-sm font-medium mb-1 text-amber-300">Номер телефона</label>
                    <input type="tel" name="phone" autocomplete="tel"
                           class="w-full px-4 py-2 bg-amber-950/80 border border-amber-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-white">
                </div>
                <div class="mt-4">
                    <label class="block text-sm font-medium mb-1 text-amber-300">Дополнительные пожелания/вопросы</label>
                    <textarea name="wishes" rows="3"
                              class="w-full px-4 py-2 bg-amber-950/80 border border-amber-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 text-white resize-y"></textarea>
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-orange-600 text-white py-2 rounded-lg font-semibold hover:bg-orange-500 transition duration-200 shadow-lg shadow-orange-950 mt-6">
                Отправить заявку
            </button>
        </form>
        <p class="mt-4 text-xs text-center text-amber-500">
            Уже есть аккаунт? <a href="/login" class="text-orange-400 hover:underline">Войти</a>
        </p>
    </div>
</body>
</html>
