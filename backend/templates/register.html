<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 h-screen flex items-center justify-center text-gray-200">
    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-sm border border-gray-700">
        <h2 class="text-3xl font-bold mb-6 text-center text-blue-400">Регистрация</h2>
        <form action="/register" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-400">Имя пользователя</label>
                <input type="text" name="username" required autocomplete="off"
                       class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-400">Пароль</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
            </div>
            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-500 transition duration-200 shadow-lg shadow-blue-900/40">
                Зарегистрироваться
            </button>
        </form>
        <p class="mt-4 text-xs text-center text-gray-500">
            Для перехода в админку допишите <span class="text-blue-400 font-mono">/admin</span> в адресной строке.
        </p>
    </div>
</body>
</html>
