<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение почты — Осенний Бал 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #1a0f05 0%, #0a0502 100%);
        }
        .font-serif-lux {
            font-family: 'Marcellus', serif;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden">
    <!-- Декоративные размытые осенние круги -->
    <div class="absolute w-96 h-96 bg-orange-900/10 rounded-full blur-3xl -top-12 -left-12 pointer-events-none"></div>
    <div class="absolute w-96 h-96 bg-amber-950/20 rounded-full blur-3xl -bottom-12 -right-12 pointer-events-none"></div>

    <div class="max-w-md w-full bg-stone-900/80 backdrop-blur-md border border-amber-900/30 p-8 rounded-2xl shadow-2xl relative z-10">
        <div class="text-center mb-8">
            <div class="inline-block p-3 bg-amber-950/40 rounded-full border border-amber-800/30 mb-4 text-amber-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 19v-8.93a2 2 0 01.89-1.664l8-5.333a2 2 0 012.22 0l8 5.333A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-1.14.76a2 2 0 01-2.22 0l-1.14-.76" />
                </svg>
            </div>
            <h1 class="text-3xl font-serif-lux text-amber-500 tracking-wide">Подтверждение почты</h1>
            <p class="text-xs text-stone-400 mt-2">Мы отправили 6-значный код подтверждения на ваш Email. Пожалуйста, введите его ниже для активации аккаунта.</p>
        </div>

        <!-- Вывод ошибок флэш-сообщений -->
        {% if error %}
        <div class="bg-red-950/40 border border-red-900/40 text-red-400 p-3 rounded-lg text-xs text-center mb-6">
            {{ error }}
        </div>
        {% endif %}

        <form action="/verify" method="POST" class="space-y-6">
            <div>
                <label for="code" class="block text-xs font-semibold uppercase text-amber-600/80 tracking-widest mb-2 text-center">Код подтверждения</label>
                <input 
                    type="text" 
                    name="code" 
                    id="code" 
                    maxlength="6"
                    placeholder="000000" 
                    required 
                    class="w-full bg-stone-950/60 border border-amber-900/20 rounded-xl px-4 py-3.5 text-center text-2xl font-bold tracking-[0.5em] text-amber-400 focus:outline-none focus:border-amber-600 focus:ring-1 focus:ring-amber-600 transition placeholder-stone-700 uppercase"
                >
            </div>

            <button 
                type="submit" 
                class="w-full bg-gradient-to-r from-amber-700 to-orange-700 hover:from-amber-600 hover:to-orange-600 text-stone-950 font-bold py-3.5 rounded-xl transition shadow-lg shadow-orange-900/20 hover:shadow-orange-900/30 text-sm tracking-wider"
            >
                Подтвердить регистрацию
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-stone-800/60 text-center text-xs text-stone-500">
            Не пришло письмо? Проверьте папку <span class="text-amber-600/80 font-medium">Спам</span><br> или <a href="/register" class="text-amber-500 hover:underline mt-1 inline-block">зарегистрируйтесь заново</a>.
        </div>
    </div>
</body>
</html>
