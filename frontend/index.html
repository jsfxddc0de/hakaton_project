<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — Настройка профиля</title>
    <style>
        /* Базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Тот самый глубокий тёмно-синий фон из второго слайда */
            background-color: #0b111e; 
            color: #ffffff;
            display: flex;
            min-height: 100vh;
        }

        /* --- БОКОВОЕ МЕНЮ (САЙДБАР) --- */
        .sidebar {
            width: 280px;
            background-color: #070b13; /* Чуть темнее основного фона для объёма */
            border-right: 1px solid rgba(212, 175, 55, 0.15); /* Едва заметная золотая линия */
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: fixed;
            height: 100vh;
        }

        .sidebar-title {
            color: #d4af37; /* Золотой цвет */
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-item a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #a0aec0;
            text-decoration: none;
            padding: 14px 16px;
            border-radius: 8px;
            transition: all 0.25s ease;
            font-size: 0.95rem;
        }

        .menu-item a:hover {
            background-color: rgba(212, 175, 55, 0.08);
            color: #d4af37;
        }

        /* Стрелочки у нужных пунктов из твоего листка */
        .menu-item.with-arrow a::after {
            content: '→';
            font-size: 1rem;
            opacity: 0.7;
            transition: transform 0.25s;
        }

        .menu-item.with-arrow a:hover::after {
            transform: translateX(4px);
        }

        /* Нижние кнопки */
        .sidebar-footer {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .btn-action {
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-logout {
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.03);
            text-align: center;
        }

        .btn-logout:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .btn-delete {
            color: #ff5252;
            background-color: rgba(255, 82, 82, 0.05);
            text-align: center;
        }

        .btn-delete:hover {
            background-color: rgba(255, 82, 82, 0.12);
        }


        /* --- ОСНОВНАЯ ЧАСТЬ СТРАНИЦЫ --- */
        .main-content {
            margin-left: 280px; /* Отступ равен ширине сайдбара */
            flex-grow: 1;
            padding: 60px 80px;
            max-width: 1000px;
        }

        .header-container {
            margin-bottom: 40px;
        }

        /* Заголовок ЛК */
        .main-title {
            font-size: 2.2rem;
            color: #d4af37;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #718096;
            font-size: 0.95rem;
        }

        /* Форма и сетка полей */
        .profile-form {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 12px;
            padding: 40px;
        }
        /* Блок с ФИО и Аватаром */
        .profile-top-block {
            display: flex;
            gap: 30px;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Место под фото */
        .avatar-placeholder {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.05);
            border: 2px dashed rgba(212, 175, 55, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4af37;
            font-size: 0.85rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .avatar-placeholder:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
        }

        .fio-input-wrapper {
            flex-grow: 1;
        }

        /* Сетка для остальных полей ввода (2 колонки) */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 35px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Стили названий полей с точкой, как на листке */
        .input-group label {
            color: #a0aec0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        .input-group label::before {
            content: '•';
            color: #d4af37;
            margin-right: 6px;
            font-size: 1.1rem;
        }

        /* Красивые темные инпуты */
        .form-input {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 14px 16px;
            color: #ffffff;
            font-size: 0.95rem;
            transition: all 0.25s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #d4af37;
            background-color: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
        }

        /* Плейсхолдер текста */
        .form-input::placeholder {
            color: #4a5568;
        }

        /* Кнопка сохранения изменений */
        .btn-submit {
            background: linear-gradient(135deg, #d4af37 0%, #b89326 100%);
            color: #070b13;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Сайдбар слева -->
    <aside class="sidebar">
        <div>
            <div class="sidebar-title">Личный кабинет</div>
            <ul class="menu-list">
                <li class="menu-item with-arrow"><a href="#requests">Мои заявки</a></li>
                <li class="menu-item with-arrow"><a href="#favorites">Избранное</a></li>
                <li class="menu-item"><a href="#organizations">Мои организации</a></li>
            </ul>
        </div>

        <div class="sidebar-footer">
            <a href="#logout" class="btn-action btn-logout">Выйти из аккаунта</a>
            <a href="#delete" class="btn-action btn-delete">Удалить профиль</a>
        </div>
    </aside>

    <!-- Основной контент справа -->
    <main class="main-content">
        <div class="header-container">
            <h1 class="main-title">Заполнение профиля</h1>
            <p class="subtitle">Пожалуйста, укажите актуальные данные для участия в бале</p>
        </div>

        <!-- Форма -->
         <form class="profile-form" action="#" method="POST">
            
            <!-- Сверху: Фото + ФИО (как главные элементы) -->
            <div class="profile-top-block">
                <div class="avatar-placeholder">
                    + Фото
                </div>
                <div class="fio-input-wrapper class-input">
                    <div class="input-group">
                        <label for="user-fio">Ваше полное ФИО</label>
                        <input type="text" id="user-fio" class="form-input" placeholder="Например: Иванов Иван Иванович" required>
                    </div>
                </div>
            </div>

            <!-- Сетка для остальных полей ввода -->
            <div class="input-grid">
                <div class="input-group">
                    <label for="user-class">Класс / Группа</label>
                    <input type="text" id="user-class" class="form-input" placeholder="Введите ваш класс или группу">
                </div>

                <div class="input-group">
                    <label for="user-email">Электронная почта (Email)</label>
                    <input type="email" id="user-email" class="form-input" placeholder="example@mail.ru">
                </div>

                <div class="input-group">
                    <label for="user-gender">Пол</label>
                    <input type="text" id="user-gender" class="form-input" placeholder="Мужской / Женский">
                </div>

                <div class="input-group">
                    <label for="user-city">Город</label>
                    <input type="text" id="user-city" class="form-input" placeholder="Укажите ваш город">
                </div>
            </div>

            <!-- Кнопка действия -->
            <button type="submit" class="btn-submit">Сохранить изменения</button>

        </form>
    </main>

</body>
</html>
